services:
  - type: web
    name: ultimate-forex-frontiers-crypto-alert-bot
    env: python
    plan: free
    repo: https://github.com/YOUR_USERNAME/crypto-alert-bot
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python bot.py"
    autoDeploy: true
    envVars:
      - key: BOT_TOKEN
        scope: run
      - key: CHANNEL_ID
        scope: run
      - key: CRYPTOPANIC_API_KEY
        scope: run
